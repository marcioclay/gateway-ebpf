name: mqtt-ebpf-lab

topology:
  nodes:
    attacker:
      kind: linux
      image: nicolaka/netshoot
      mgmt-ipv4: 172.20.20.10 # IP de gerência
      # eth1 será configurada manualmente via comando ou script

    gateway:
      kind: linux
      image: ubuntu:22.04
      binds:
        - ./ebpf-code:/src
      resources:
        cpu: 1
        memory: 1G

    broker:
      kind: linux
      image: eclipse-mosquitto:latest

    sensor:
      kind: linux
      image: python:3.10-slim

  links:
    # Rede do Atacante (10.0.1.0/24)
    - endpoints: ["attacker:eth1", "gateway:eth1"]
    
    # Rede dos Sensores (10.0.2.0/24)
    - endpoints: ["sensor:eth1", "gateway:eth2"]
    
    # Rede do Broker (192.168.1.0/24) - Simbolizando a rede interna protegida
    - endpoints: ["gateway:eth3", "broker:eth1"]
