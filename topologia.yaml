name: ebpf-mqtt

topology:
  nodes:
    # VÍTIMA: O Gateway que roda o Mosquitto + eBPF/XDP
    gateway:
      kind: linux
      image: ubuntu:22.04
      binds:
        - ./ebpf-code:/src
      exec:
        - apt-get update && apt-get install -y mosquitto
        - ip addr add 10.0.0.1/24 dev eth1
        - service mosquitto start

    # ATACANTE: Nó comprometido que gera o Flood
    atacante:
      kind: linux
      image: nicolaka/netshoot
      exec:
        - ip addr add 10.0.0.10/24 dev eth1

    # CLIENTE BENIGNO: Sensor legítimo para medir latência/disponibilidade
    sensor:
      kind: linux
      image: nicolaka/netshoot
      exec:
        - ip addr add 10.0.0.20/24 dev eth1

 links:
    # Conexão via Bridge para simular o barramento IoT do artigo
    - b_endpoints: ["gateway:eth1", "atacante:eth1", "sensor:eth1"]
