name: ebpf-mqtt

topology:
  nodes:
    switch:
      kind: bridge

    # VÍTIMA: Gateway IoT (Compila e ativa o eBPF automaticamente no boot)
    gateway:
      kind: linux
      image: ubuntu:22.04
      binds:
        - ./:/src
      exec:
        # 1. Configuração de Rede Básica
        - ip addr add 10.0.0.1/24 dev eth1
        - ip link set dev eth1 mtu 1400
        # 2. Instalação das ferramentas essenciais do Kernel
        - apt-get update && apt-get install -y clang llvm libelf-dev libbpf-dev iproute2 iputils-ping tcpdump
        # 3. Compilação automática do código C puro
        - clang -O2 -target bpf -c /src/xdp_monitor.c -o /src/xdp_monitor.o
        # 4. Carga automática da Sonda XDP diretamente na interface eth1
        - ip link set dev eth1 xdpgeneric obj /src/xdp_monitor.o sec xdp

    # ATACANTE
    atacante:
      kind: linux
      image: nicolaka/netshoot
      binds:
        - ./src:/src
      exec:
        - ip addr add 10.0.0.10/24 dev eth1

    # CLIENTE BENIGNO: Sensor
    sensor:
      kind: linux
      image: nicolaka/netshoot
      binds:
        - ./src:/src
      exec:
        - ip addr add 10.0.0.20/24 dev eth1

  links:
    - endpoints: ["gateway:eth1", "switch:eth1"]
    - endpoints: ["atacante:eth1", "switch:eth2"]
    - endpoints: ["sensor:eth1", "switch:eth3"]
