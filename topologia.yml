name: ebpf-mqtt

topology:
  nodes:
    switch:
      kind: bridge

    # VÍTIMA: Gateway IoT
    gateway:
      kind: linux
      image: ubuntu:22.04
      binds:
        - xdp_monitor.o:/xdp_monitor.o
        #- ./:/src
      exec:
        - apt-get update
        - apt-get install -y mosquitto iproute2 iputils-ping tcpdump
        - ip addr add 10.0.0.1/24 dev eth1
        # Libera o Mosquitto para aceitar conexões da rede externa e anônimas
        - sh -c "echo 'listener 1883' >> /etc/mosquitto/mosquitto.conf"
        - sh -c "echo 'allow_anonymous true' >> /etc/mosquitto/mosquitto.conf"
        - service mosquitto restart

    # ATACANTE
    atacante:
      kind: linux
      image: nicolaka/netshoot
      exec:
        - ip addr add 10.0.0.10/24 dev eth1

    # CLIENTE BENIGNO
    sensor:
      kind: linux
      image: nicolaka/netshoot
      exec:
        - ip addr add 10.0.0.20/24 dev eth1

  links:
    - endpoints: ["gateway:eth1", "switch:eth1"]
    - endpoints: ["atacante:eth1", "switch:eth2"]
    - endpoints: ["sensor:eth1", "switch:eth3"]
