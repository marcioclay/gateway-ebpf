name: ebpf-mqtt

topology:
  nodes:
    # VÍTIMA: Gateway IoT (Broker Mosquitto + Sonda eBPF/XDP)
    gateway:
      kind: linux
      image: ubuntu:22.04
      binds:
        - ./:/src
      exec:
        - apt-get update && apt-get install -y mosquitto
        - ip addr add 10.0.0.1/24 dev eth1
        - service mosquitto start

    # ATACANTE: Dispositivo comprometido
    attacker:
      kind: linux
      image: nicolaka/netshoot
      exec:
        - ip addr add 10.0.0.10/24 dev eth1

    # CLIENTE BENIGNO: Sensor legítimo
    sensor:
      kind: linux
      image: nicolaka/netshoot
      exec:
        - ip addr add 10.0.0.20/24 dev eth1

  links:
    # Criando o barramento (bridge) conectando todos os eth1
    - endpoints: ["gateway:eth1", "attacker:eth1", "sensor:eth1"]
