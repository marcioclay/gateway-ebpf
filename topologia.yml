name: gateway-ebpf

topology:
  nodes:
    switch:
      kind: linux
      image: nicolaka/netshoot:latest
      exec:
        - ip link add br0 type bridge
        - ip link set br0 up
        - ip link set eth1 master br0
        - ip link set eth2 master br0
        - ip link set eth3 master br0
        - ip link set eth1 up
        - ip link set eth2 up
        - ip link set eth3 up

    # --- GATEWAY IOT ---
    gateway:
      kind: linux
      image: nicolaka/netshoot:latest
      binds:
        - ./xdp_monitor.o:/xdp_monitor.o
      exec:
        - ip addr add 10.0.0.1/24 dev eth1

    # --- ATACANTE ---
    atacante:
      kind: linux
      image: nicolaka/netshoot:latest
      binds:
        - ./src:/src
      exec:
        - ip addr add 10.0.0.10/24 dev eth1

    # --- SENSOR ---
    sensor:
      kind: linux
      image: nicolaka/netshoot:latest
      binds:
        - ./src:/src
      exec:
        - ip addr add 10.0.0.20/24 dev eth1

  links:
    - endpoints: ["gateway:eth1", "switch:eth1"]
    - endpoints: ["atacante:eth1", "switch:eth2"]
    - endpoints: ["sensor:eth1", "switch:eth3"]
