name: ebpf-mqtt

topology:
  nodes:
    # O barramento virtual (Bridge)
    br-iot:
      kind: bridge

    # VÍTIMA: Gateway IoT
    gateway:
      kind: linux
      image: ubuntu:22.04
      binds:
        - ./:/src
      exec:
        - apt-get update && apt-get install -y mosquitto
        - ip addr add 10.0.0.1/24 dev eth1
        - service mosquitto start

    # ATACANTE
    attacker:
      kind: linux
      image: nicolaka/netshoot
      exec:
        - ip addr add 10.0.0.10/24 dev eth1

    # CLIENTE BENIGNO
    sensor:
      kind: linux
      image: nicolaka/netshoot
      exec:
        - ip addr add 10.0.0.20/24 dev eth1

  links:
    # Conectando cada nó individualmente à Bridge (Barramento)
    - endpoints: ["gateway:eth1", "br-iot:eth1"]
    - endpoints: ["attacker:eth1", "br-iot:eth2"]
    - endpoints: ["sensor:eth1", "br-iot:eth3"]
