name: gateway-ebpf

topology:
  nodes:
    # 1. O Switch LAN Virtual
    switch:
      kind: bridge

    # 2. Gateway IoT (Vítima)
    gateway:
      kind: linux
      image: nicolaka/netshoot:latest
      cpuset: "0"
      privileged: true       
      bpf-support: true      
      binds:
        - ./xdp_monitor.o:/xdp_monitor.o
      exec:
        - ip addr add 10.0.0.1/24 dev eth1

    # 3. Máquina Atacante
    atacante:
      kind: linux
      image: nicolaka/netshoot:latest
      privileged: true
      binds:
        - ./src:/src
      exec:
        - ip addr add 10.0.0.10/24 dev eth1

    # 4. Cliente Benigno (Sensor)
    sensor:
      kind: linux
      image: nicolaka/netshoot:latest
      privileged: true
      binds:
        - ./src:/src
      exec:
        - ip addr add 10.0.0.20/24 dev eth1

  links:
    - endpoints: ["gateway:eth1", "switch:eth1"]
    - endpoints: ["atacante:eth1", "switch:eth2"]
    - endpoints: ["sensor:eth1", "switch:eth3"]
